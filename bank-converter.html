<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bankovni Izvodi — Bank Statement Converter</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0f4fa;
      --surface: #ffffff;
      --primary: #1a3a6b;
      --primary-light: #2952a3;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --green: #16a34a;
      --red: #dc2626;
      --text: #1e293b;
      --muted: #64748b;
      --border: #dde3ef;
      --radius: 12px;
      --shadow: 0 4px 24px rgba(26,58,107,.10);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--primary);
      color: #fff;
      padding: 0 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 68px;
      box-shadow: 0 2px 14px rgba(0,0,0,.22);
    }

    .header-left { display: flex; align-items: center; gap: 14px; }
    header h1 { font-size: 1.25rem; font-weight: 700; letter-spacing: -.01em; }
    header .sub { font-size: .78rem; color: #9bb5d8; margin-top: 2px; }

    /* Language switcher */
    .lang-switcher {
      display: flex;
      gap: 4px;
      background: rgba(255,255,255,.08);
      border-radius: 8px;
      padding: 4px;
      flex-shrink: 0;
    }

    .lang-btn {
      background: none;
      border: none;
      color: #9bb5d8;
      font-size: .78rem;
      font-weight: 700;
      padding: 5px 10px;
      border-radius: 6px;
      cursor: pointer;
      letter-spacing: .04em;
      transition: background .15s, color .15s;
      white-space: nowrap;
    }

    .lang-btn:hover  { background: rgba(255,255,255,.12); color: #fff; }
    .lang-btn.active { background: rgba(255,255,255,.22); color: #fff; }

    /* ── Main ── */
    main { max-width: 1140px; margin: 40px auto; padding: 0 20px 60px; }

    /* ── Upload card ── */
    .upload-card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 40px;
      text-align: center;
    }

    .drop-zone {
      border: 2.5px dashed var(--border);
      border-radius: 10px;
      padding: 54px 24px;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      position: relative;
    }

    .drop-zone.drag-over { border-color: var(--accent); background: #eff6ff; }

    .drop-zone input[type=file] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }

    .drop-icon {
      width: 58px; height: 58px;
      background: #eff6ff; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 18px;
    }

    .drop-zone h2 { font-size: 1.05rem; font-weight: 600; margin-bottom: 6px; }
    .drop-zone p  { font-size: .87rem; color: var(--muted); }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 11px 22px; border: none; border-radius: 8px;
      font-size: .92rem; font-weight: 600; cursor: pointer;
      transition: background .16s, transform .1s;
    }
    .btn:active { transform: scale(.97); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:disabled { background: #93c5fd; cursor: not-allowed; transform: none; }
    .btn-demo {
      background: none; color: var(--muted); border: 1.5px dashed var(--border);
    }
    .btn-demo:hover { background: #f1f5f9; border-color: var(--accent); color: var(--accent); }
    .btn-csv   { background: #16a34a; color: #fff; }
    .btn-csv:hover { background: #15803d; }
    .btn-excel { background: #1d6f42; color: #fff; }
    .btn-excel:hover { background: #145233; }

    /* ── File info ── */
    .file-info {
      display: none; align-items: center; gap: 12px;
      background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 8px;
      padding: 12px 18px; margin-top: 20px; text-align: left;
    }
    .file-info .name { font-weight: 600; font-size: .9rem; }
    .file-info .size { font-size: .79rem; color: var(--muted); }

    /* ── Status ── */
    .status {
      display: none; align-items: center; gap: 10px;
      padding: 13px 18px; border-radius: 8px; margin-top: 18px;
      font-size: .89rem; font-weight: 500;
    }
    .status.loading { background: #eff6ff; border: 1px solid #bfdbfe; color: #1d4ed8; }
    .status.success { background: #f0fdf4; border: 1px solid #bbf7d0; color: #15803d; }
    .status.error   { background: #fef2f2; border: 1px solid #fecaca; color: #b91c1c; }

    .spinner {
      width: 17px; height: 17px;
      border: 3px solid #93c5fd; border-top-color: #1d4ed8;
      border-radius: 50%;
      animation: spin .7s linear infinite; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Progress ── */
    .progress-wrap {
      display: none; background: #dbeafe; border-radius: 99px;
      height: 5px; margin-top: 12px; overflow: hidden;
    }
    .progress-bar { height: 100%; background: var(--accent); border-radius: 99px; transition: width .25s; width: 0%; }

    /* ── Privacy note ── */
    .privacy-note {
      display: flex; align-items: center; gap: 8px;
      background: #fefce8; border: 1px solid #fde68a; border-radius: 8px;
      padding: 10px 16px; font-size: .81rem; color: #92400e; margin-top: 18px;
    }

    /* ── Results card ── */
    .results-card {
      display: none; background: var(--surface);
      border-radius: var(--radius); box-shadow: var(--shadow);
      margin-top: 28px; overflow: hidden;
    }

    .results-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 24px; border-bottom: 1px solid var(--border);
      flex-wrap: wrap; gap: 12px;
    }
    .results-header h3 { font-size: 1rem; font-weight: 700; }
    .results-header .rh-sub { font-size: .81rem; color: var(--muted); margin-top: 2px; }
    .export-btns { display: flex; gap: 10px; flex-wrap: wrap; }

    .badge {
      display: inline-block; background: #dbeafe; color: #1d4ed8;
      font-size: .73rem; font-weight: 700; padding: 2px 9px; border-radius: 99px;
    }

    /* ── Table ── */
    .table-wrap { overflow-x: auto; max-height: 540px; overflow-y: auto; }

    table { width: 100%; border-collapse: collapse; font-size: .85rem; }

    thead th {
      background: var(--primary); color: #fff;
      padding: 11px 14px; text-align: left; font-weight: 600;
      position: sticky; top: 0; white-space: nowrap; z-index: 1;
    }

    tbody tr:nth-child(even) { background: #f8fafc; }
    tbody tr:hover { background: #eff6ff; }

    td {
      padding: 9px 14px; border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }

    .td-amount { font-variant-numeric: tabular-nums; font-weight: 600; }
    .td-amount.neg { color: var(--red); }
    .td-amount.pos { color: var(--green); }
    .td-desc { max-width: 340px; word-break: break-word; }

    .empty-state { text-align: center; padding: 60px 24px; color: var(--muted); }
    .empty-state svg { margin: 0 auto 14px; display: block; opacity: .3; }

    @media (max-width: 640px) {
      .upload-card { padding: 22px 14px; }
      .results-header { flex-direction: column; align-items: flex-start; }
      header { padding: 12px 16px; flex-wrap: wrap; }
      header h1 { font-size: 1.05rem; }
    }
  </style>
</head>
<body>

<header>

      </svg>

    <div class="privacy-note">
      <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.1">

  <div class="results-card" id="resultsCard">

      <div>

        <button class="btn btn-excel" id="excelBtn">

    <div class="table-wrap">

  </div>
</main>

// ═══════════════════════════════════════════════════════════════
// LANGUAGE SWITCHER
// ═══════════════════════════════════════════════════════════════
let lang = 'sr';

function applyLang(l) {
  lang = l;
  const t = T[l];
  document.documentElement.lang = l;
  document.title = t.title + (l==='sr' ? ' | bankovniizvodi.rs' : '');

  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    if (t[key] !== undefined) el.textContent = t[key];
  });

  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.lang === l);
  });

  // Update dynamic text that's already rendered
  if (parsedRows.length) updateDynamicText();
}

document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => applyLang(btn.dataset.lang));
});

// ═══════════════════════════════════════════════════════════════
// PDF.js (loaded as module)
// ═══════════════════════════════════════════════════════════════
let pdfjsLib;
async function getPdfJs() {
  if (pdfjsLib) return pdfjsLib;
  pdfjsLib = await import('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs');
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.worker.min.mjs';
  return pdfjsLib;
}

// ═══════════════════════════════════════════════════════════════
// FILE SELECTION
// ═══════════════════════════════════════════════════════════════
function fmtSize(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
  return (b/1048576).toFixed(1) + ' MB';
}

function onFileSelected(file) {
  const t = T[lang];

// ═══════════════════════════════════════════════════════════════
// STATUS / PROGRESS
// ═══════════════════════════════════════════════════════════════
function setStatus(type, msg) {
  statusBar.className = 'status ' + type;
  statusBar.style.display = 'flex';
  statusText.textContent = msg;
  spinner.style.display      = type === 'loading' ? 'block' : 'none';
  statusIconOk.style.display = type === 'success' ? 'block' : 'none';
  statusIconErr.style.display= type === 'error'   ? 'block' : 'none';
}
function hideStatus() { statusBar.style.display = 'none'; }
function setProgress(pct) {
  progressWrap.style.display = 'block';
  progressBar.style.width = pct + '%';
  if (pct >= 100) setTimeout(() => { progressWrap.style.display = 'none'; }, 600);
}

// ═══════════════════════════════════════════════════════════════
// PDF TEXT EXTRACTION
// ═══════════════════════════════════════════════════════════════
async function extractText(file) {
  const lib = await getPdfJs();
  const buf = await file.arrayBuffer();
  const pdf = await lib.getDocument({ data: buf }).promise;
  const pages = [];

  for (let i = 1; i <= pdf.numPages; i++) {
    setProgress(Math.round((i / pdf.numPages) * 55));
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();

    // Reconstruct lines by grouping items on the same Y coordinate
    const lineMap = new Map();
    for (const item of content.items) {
      if (!item.str?.trim()) continue;
      const y = Math.round(item.transform[5]);
      if (!lineMap.has(y)) lineMap.set(y, []);
      lineMap.get(y).push({ x: item.transform[4], text: item.str });
    }
    const lines = [...lineMap.keys()]
      .sort((a, b) => b - a)
      .map(y => lineMap.get(y).sort((a, b) => a.x - b.x).map(i => i.text).join(' '));

    pages.push(lines.join('\n'));
  }
  return pages.join('\n<<PAGE>>\n');
}

// ═══════════════════════════════════════════════════════════════
// TRANSACTION PARSER
// ═══════════════════════════════════════════════════════════════
const DATE_PATTERNS = [
  /\b(\d{1,2}[\/\-\.]\d{1,2}[\/\-\.]\d{2,4})\b/,
  /\b(\d{4}[\/\-\.]\d{1,2}[\/\-\.]\d{1,2})\b/,
  /\b(\d{1,2}\s+(?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)[a-z]*\.?\s+\d{2,4})\b/i,
  /\b((?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)[a-z]*\.?\s+\d{1,2},?\s+\d{2,4})\b/i,
];

const AMOUNT_RE = /-?\$?[\d,]{1,12}\.\d{2}/g;

function parseDate(s) {
  if (!s) return '';
  s = s.trim();
  const tries = [
    [/^(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{4})$/, m => `${m[3]}-${z(m[2])}-${z(m[1])}`],
    [/^(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{2})$/,  m => `20${m[3]}-${z(m[2])}-${z(m[1])}`],
    [/^(\d{4})[\/\-\.](\d{1,2})[\/\-\.](\d{1,2})$/,  m => `${m[1]}-${z(m[2])}-${z(m[3])}`],
    [/^(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{4})$/,  m => `${m[3]}-${z(m[1])}-${z(m[2])}`],
  ];
  for (const [re, fn] of tries) {
    const m = s.match(re); if (m) return fn(m);
  }
  const d = new Date(s);
  if (!isNaN(d)) {
    const y = d.getFullYear() < 100 ? d.getFullYear() + 2000 : d.getFullYear();
    return `${y}-${z(d.getMonth()+1)}-${z(d.getDate())}`;
  }
  return s;
}

function z(n) { return String(n).padStart(2, '0'); }

function cleanAmt(s) {
  if (!s) return null;
  const n = parseFloat(s.replace(/[^\d.\-]/g, ''));
  return isNaN(n) ? null : n;
}

function parseTransactions(text) {
  const rows = [];
  const lines = text.split('\n');
  let pending = null;

  for (const raw of lines) {
    const line = raw.trim();
    if (!line || line === '<<PAGE>>') { if (pending) { rows.push(pending); pending = null; } continue; }

    let dateMatch = null;
    for (const pat of DATE_PATTERNS) {
      const m = line.match(pat); if (m) { dateMatch = m; break; }
    }

    const amounts = [...(line.matchAll(AMOUNT_RE))].map(m => m[0]);

    if (dateMatch && amounts.length > 0) {
      if (pending) rows.push(pending);

      const ds = dateMatch[1];
      let desc = line.replace(ds, '');
      for (const a of amounts) desc = desc.replace(a, '');
      desc = desc.replace(/\s{2,}/g, ' ').trim();

      let amount = null, balance = null;
      if (amounts.length === 1) {
        amount = cleanAmt(amounts[0]);
      } else if (amounts.length >= 2) {
        amount  = cleanAmt(amounts[amounts.length - 2]);
        balance = cleanAmt(amounts[amounts.length - 1]);
      }

      pending = {
        date:        parseDate(ds),
        description: desc,
        amount,
        debit:  amount !== null && amount < 0 ? Math.abs(amount) : null,
        credit: amount !== null && amount > 0 ? amount           : null,
        balance,
      };
    } else if (!dateMatch && pending && amounts.length === 0 && line.length > 2) {
      pending.description += ' ' + line;
    } else if (pending) {
      rows.push(pending); pending = null;
    }
  }
  if (pending) rows.push(pending);
  return rows.filter(r => r.date || r.description);
}

// ═══════════════════════════════════════════════════════════════
// TABLE RENDERING
// ═══════════════════════════════════════════════════════════════
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function fmtNum(n) {
  if (n === null || n === undefined) return '';
  return n.toLocaleString('de-DE', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function amountCell(val) {
  if (val === null || val === undefined || val === '') return '';
  const cls = val < 0 ? 'neg' : 'pos';
  const sign = val < 0 ? '−' : '+';
  return `<span class="td-amount ${cls}">${sign}${fmtNum(Math.abs(val))}</span>`;
}

function renderTable(rows) {
  const t = T[lang];
  rowCountEl.textContent = rows.length;
  rhSub.textContent = rows.length > 0 ? t.scrollHint : '';

  if (!rows.length) {
    tableBody.innerHTML = `<tr><td colspan="6">
      <div class="empty-state">
        <svg width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.1">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 13h6m-3-3v6m5 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
        </svg>
        <p>${esc(t.emptyMsg)}</p>
      </div>
    </td></tr>`;
    return;
  }

  tableBody.innerHTML = rows.map(r => `<tr>
    <td>${esc(r.date)}</td>
    <td class="td-desc">${esc(r.description)}</td>
    <td>${amountCell(r.amount)}</td>
    <td>${r.debit  !== null ? `<span class="td-amount neg">${fmtNum(r.debit)}</span>`  : ''}</td>
    <td>${r.credit !== null ? `<span class="td-amount pos">${fmtNum(r.credit)}</span>` : ''}</td>
    <td>${r.balance !== null ? `<span style="font-variant-numeric:tabular-nums">${fmtNum(r.balance)}</span>` : ''}</td>
  </tr>`).join('');
}

function updateDynamicText() {
  const t = T[lang];
  rhSub.textContent = parsedRows.length > 0 ? t.scrollHint : '';
}

// ═══════════════════════════════════════════════════════════════
// CSV EXPORT  (readable: real numbers, semicolon separator)
// ═══════════════════════════════════════════════════════════════
csvBtn.addEventListener('click', () => {
  if (!parsedRows.length) return;
  const t = T[lang];
  const cols = [t.colDate, t.colDesc, t.colAmount, t.colDebit, t.colCredit, t.colBalance];
  const sep = ';';  // semicolon — opens correctly in European Excel locales

  const escape = v => {
    const s = v === null || v === undefined ? '' : String(v);
    return s.includes(sep) || s.includes('"') || s.includes('\n')
      ? `"${s.replace(/"/g, '""')}"`
      : s;
  };

  const numStr = n => n !== null && n !== undefined ? String(n.toFixed(2)).replace('.', ',') : '';

  const lines = [
    cols.map(escape).join(sep),
    ...parsedRows.map(r => [
      escape(r.date),
      escape(r.description),
      numStr(r.amount),
      numStr(r.debit),
      numStr(r.credit),
      numStr(r.balance),
    ].join(sep))
  ].join('\r\n');

  downloadBlob('﻿' + lines, `${t.filePrefix}.csv`, 'text/csv;charset=utf-8');
});

// ═══════════════════════════════════════════════════════════════
// EXCEL EXPORT  (formatted: real numbers, colored amounts, autofit)
// ═══════════════════════════════════════════════════════════════
excelBtn.addEventListener('click', () => {
  if (!parsedRows.length) return;
  const t = T[lang];

  const headers = [t.colDate, t.colDesc, t.colAmount, t.colDebit, t.colCredit, t.colBalance];

  // Build data array with real numbers (not strings)
  const data = parsedRows.map(r => [
    r.date ?? '',
    r.description ?? '',
    r.amount  ?? '',
    r.debit   ?? '',
    r.credit  ?? '',
    r.balance ?? '',
  ]);

  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet([headers, ...data]);

  // Column widths
  ws['!cols'] = [
    { wch: 13 },  // Date
    { wch: 46 },  // Description
    { wch: 14 },  // Amount
    { wch: 14 },  // Debit
    { wch: 14 },  // Credit
    { wch: 16 },  // Balance
  ];

  // Freeze header row
  ws['!freeze'] = { xSplit: 0, ySplit: 1 };

  // Number format for amount columns (cols 2–5, 0-indexed)
  const numFmt = '#,##0.00';
  const range = XLSX.utils.decode_range(ws['!ref']);
  for (let r = 1; r <= range.e.r; r++) {
    for (let c = 2; c <= 5; c++) {
      const addr = XLSX.utils.encode_cell({ r, c });
      if (ws[addr] && ws[addr].v !== '') {
        ws[addr].t = 'n';
        ws[addr].z = numFmt;
      }
    }
  }

  XLSX.utils.book_append_sheet(wb, ws, t.sheetName);
  XLSX.writeFile(wb, `${t.filePrefix}.xlsx`);
});

// ═══════════════════════════════════════════════════════════════
// DOWNLOAD HELPER
// ═══════════════════════════════════════════════════════════════
function downloadBlob(content, filename, mimeType) {
  const blob = new Blob([content], { type: mimeType });
  const url = URL.createObjectURL(blob);
  const a = Object.assign(document.createElement('a'), { href: url, download: filename });
  a.click();
  URL.revokeObjectURL(url);
}
